# Render Blueprint — deploys the web service.
# Run: connect this repo in Render dashboard → "New Blueprint Instance"
#
# Database: this project uses MySQL (not PostgreSQL).
# Options:
#   1. PlanetScale (free tier): https://planetscale.com — set DATABASE_URL in env vars
#   2. Railway MySQL: https://railway.app — set DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
#   3. Any managed MySQL host — set the env vars below accordingly
#
# Required env vars:
#   DB_HOST, DB_PORT (3306), DB_NAME, DB_USER, DB_PASS
#   SPAM_IP_HASH_KEY (random string, min 32 chars)
#   AZURE_TRANSLATE_KEY (optional — enables live translation)
#   AZURE_TRANSLATE_REGION (e.g. westeurope)

services:
  - type: web
    name: mod3
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: SPAM_IP_HASH_KEY
        generateValue: true
      - key: AZURE_TRANSLATE_KEY
        sync: false
      - key: AZURE_TRANSLATE_REGION
        value: "westeurope"
