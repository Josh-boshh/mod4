# =============================================================================
# Federal Ministry of Defence — NGINX server block
# =============================================================================
# Drop this into /etc/nginx/sites-available/defence.gov.ng
# then: sudo ln -s /etc/nginx/sites-available/defence.gov.ng \
#                  /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates are managed by Certbot (Let's Encrypt):
#   sudo certbot --nginx -d defence.gov.ng -d www.defence.gov.ng
# Certbot will automatically fill in the ssl_certificate paths below.
# =============================================================================

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name defence.gov.ng www.defence.gov.ng;

    # Allow Let's Encrypt ACME challenges (needed for cert issuance/renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://defence.gov.ng$request_uri;
    }
}

# ── Redirect www → non-www (canonical) ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.defence.gov.ng;

    # Certbot will insert these:
    ssl_certificate     /etc/letsencrypt/live/defence.gov.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/defence.gov.ng/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://defence.gov.ng$request_uri;
}

# ── Main HTTPS server block ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name defence.gov.ng;

    root  /var/www/defence.gov.ng;
    index index.html index.php;

    # ── SSL certificate paths (Certbot fills these) ───────────────────────────
    ssl_certificate     /etc/letsencrypt/live/defence.gov.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/defence.gov.ng/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Modern TLS settings ───────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling — speeds up SSL handshake for visitors
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com https://maps.google.com; connect-src 'self' https://translate.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Remove server version from response headers
    server_tokens off;
    more_clear_headers Server;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/html text/css application/javascript text/xml
                    application/json image/svg+xml;

    # Never show directory listings anywhere on the site
    autoindex off;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|ico|woff2)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Block directory browsing of /assets ───────────────────────────────────
    # Exact-match /assets and /assets/ so file requests still pass through
    location = /assets   { return 404; }
    location = /assets/  { return 404; }

    # ── PHP (admin panel) ─────────────────────────────────────────────────────
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  HTTPS on;
        add_header Cache-Control "no-store, private";
    }

    # ── Restrict admin to office IP range (uncomment & set real IPs) ─────────
    # location /admin {
    #     allow 102.89.0.0/16;   # NCC-allocated Nigerian ranges example
    #     allow 41.58.0.0/16;
    #     deny  all;
    #     try_files $uri $uri/ =404;
    # }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~* (config\.php|schema\.sql|setup\.php|\.env|\.git) {
        deny all;
        return 404;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 404 403 500 /404.html;
    # Explicit location so the error_page internal redirect resolves correctly
    location = /404.html { }

    # ── Let's Encrypt renewal ─────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
