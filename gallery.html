<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="theme-color" content="#007D53" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gallery — Federal Ministry of Defence</title>
  <meta name="description" content="Photo gallery of official events, engagements and inspections of the Federal Ministry of Defence." />
  <link rel="canonical" href="https://defence.gov.ng/gallery.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Gallery — Federal Ministry of Defence" />
  <meta property="og:description" content="Photographs from official engagements, inspections and ceremonies of the Federal Ministry of Defence." />
  <meta property="og:url" content="https://defence.gov.ng/gallery.html" />
  <meta property="og:image" content="https://defence.gov.ng/assets/images/hero/slide-1.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://defence.gov.ng/assets/images/hero/slide-1.jpg" />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css?v=19" />
  <link rel="stylesheet" href="assets/css/mobile-nav.css" />
  <style>
    /* ── Filter bar ── */
    .gallery-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .gallery-filter-btn {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .18s, color .18s, border-color .18s;
    }
    .gallery-filter-btn:hover,
    .gallery-filter-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    /* ── Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .gallery-grid figure {
      margin: 0;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--paper-3);
      cursor: zoom-in;
      position: relative;
    }
    .gallery-grid figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease;
    }
    .gallery-grid figure:hover img { transform: scale(1.05); }
    .gallery-grid figure figcaption {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.72));
      color: #fff;
      padding: 14px 16px;
      font-size: .82rem;
      line-height: 1.4;
      opacity: 0;
      transition: opacity .25s;
    }
    .gallery-grid figure:hover figcaption { opacity: 1; }
    .gallery-grid figure .gallery-cat-badge {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    /* ── Lightbox ── */
    .gallery-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,.92);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .gallery-lightbox.open { display: flex; }
    .gallery-lightbox-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .gallery-lightbox-inner img {
      max-height: 78vh;
      max-width: 100%;
      border-radius: 6px;
      object-fit: contain;
      transition: opacity .2s;
    }
    .gallery-lightbox-inner img.fading { opacity: 0; }
    .gallery-lightbox-caption {
      color: rgba(255,255,255,.88);
      font-size: .9rem;
      text-align: center;
      max-width: 700px;
    }
    .gallery-lightbox-counter {
      color: rgba(255,255,255,.45);
      font-size: .78rem;
      letter-spacing: .06em;
    }
    .gallery-lightbox-close {
      position: absolute;
      top: -14px; right: -14px;
      background: rgba(255,255,255,.12);
      border: none;
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s;
    }
    .gallery-lightbox-close:hover { background: rgba(255,255,255,.25); }
    .gallery-lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.12);
      border: none;
      color: #fff;
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s;
      z-index: 1;
    }
    .gallery-lightbox-nav:hover { background: rgba(255,255,255,.25); }
    .gallery-lightbox-prev { left: -60px; }
    .gallery-lightbox-next { right: -60px; }
    @media (max-width: 700px) {
      .gallery-lightbox-prev { left: -4px; }
      .gallery-lightbox-next { right: -4px; }
    }

    /* ── Loading / empty states ── */
    .gallery-loading, .gallery-empty {
      text-align: center;
      padding: 60px 0;
      color: var(--text-3);
      font-size: .95rem;
    }
    .gallery-loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width:880px) { .gallery-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width:540px) { .gallery-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div data-include="header"></div>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <div class="crumbs"><a href="index.html">Home</a><span>›</span>News &amp; Media<span>›</span>Gallery</div>
        <span class="eyebrow">News &amp; Media</span>
        <h1>Gallery.</h1>
        <p class="lead">Photographs from official engagements, inspections and ceremonies of the Federal Ministry of Defence.</p>
      </div>
    </section>

    <section>
      <div class="container">
        <!-- Filter bar (populated by JS) -->
        <div class="gallery-filters" id="gallery-filters"></div>

        <!-- Grid -->
        <div id="gallery-grid-wrapper">
          <div class="gallery-loading" id="gallery-loading">
            <div class="gallery-loading-spinner"></div>
            Loading gallery…
          </div>
          <div class="gallery-grid" id="gallery-grid" style="display:none;"></div>
          <div class="gallery-empty" id="gallery-empty" style="display:none;">No images in this category yet.</div>
        </div>

        <div class="text-center mt-6">
          <a href="https://www.facebook.com/modinfonigeria" target="_blank" rel="noopener" class="btn">More on Facebook</a>
          <a href="https://instagram.com/mod_nigeria" target="_blank" rel="noopener" class="btn btn-outline">More on Instagram</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Lightbox -->
  <div class="gallery-lightbox" id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="gallery-lightbox-inner">
      <button class="gallery-lightbox-close" id="gallery-lightbox-close" aria-label="Close">&times;</button>
      <button class="gallery-lightbox-nav gallery-lightbox-prev" id="gallery-lightbox-prev" aria-label="Previous image">&#8249;</button>
      <img id="gallery-lightbox-img" src="" alt="" />
      <button class="gallery-lightbox-nav gallery-lightbox-next" id="gallery-lightbox-next" aria-label="Next image">&#8250;</button>
      <p class="gallery-lightbox-caption" id="gallery-lightbox-caption"></p>
      <p class="gallery-lightbox-counter" id="gallery-lightbox-counter"></p>
    </div>
  </div>

  <div data-include="footer"></div>
  <div data-include="chatbot"></div>
  <div data-include="a11y"></div>

  <script src="assets/js/realdata.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/translator.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/chatbot.js"></script>

  <script>
  (function () {
    'use strict';

    var allImages = [];
    var activeCategory = 'All';

    var grid    = document.getElementById('gallery-grid');
    var loading = document.getElementById('gallery-loading');
    var empty   = document.getElementById('gallery-empty');
    var filters = document.getElementById('gallery-filters');
    var lb        = document.getElementById('gallery-lightbox');
    var lbImg     = document.getElementById('gallery-lightbox-img');
    var lbCap     = document.getElementById('gallery-lightbox-caption');
    var lbCounter = document.getElementById('gallery-lightbox-counter');
    var lbClose   = document.getElementById('gallery-lightbox-close');
    var lbPrev    = document.getElementById('gallery-lightbox-prev');
    var lbNext    = document.getElementById('gallery-lightbox-next');
    var lbIndex   = 0;
    var lbImages  = [];

    /* ── Fetch images from API (falls back to static hardcoded if no API) ── */
    function loadGallery() {
      // Determine API base: admin/api/gallery.php relative to this page
      var apiUrl = '/api/gallery';

      fetch(apiUrl)
        .then(function (res) {
          if (!res.ok) throw new Error('API error ' + res.status);
          return res.json();
        })
        .then(function (data) {
          allImages = data.images || [];
          if (allImages.length === 0) {
            allImages = staticFallback();
          }
          render();
        })
        .catch(function () {
          // PHP not running (static preview) — use hardcoded images
          allImages = staticFallback();
          render();
        });
    }

    /* ── Static fallback (mirrors the existing hardcoded gallery items) ── */
    function staticFallback() {
      return [
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/5c91a2fb5a3c3d7d91aa26fb98ea005d/WhatsApp-Image-2026-05-08-at-09.51.56.jpg', alt_text: 'AMCE visit', caption: 'Honourable Minister at the AMCE, Abuja — 8 May 2026', event_date: '8 May 2026', category: 'Ministerial' },
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/7ed124706b9db62fa4aae0e8bdc44f70/WhatsApp-Image-2026-05-06-at-09.44.49.jpg', alt_text: 'Regional security meeting', caption: 'Regional security meeting — 6 May 2026', event_date: '6 May 2026', category: 'Security' },
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/f2ac3e9cb69b47524dec83e6268b40b1/WhatsApp-Image-2026-05-05-at-16.06.33.jpg', alt_text: 'Veritas University delegation', caption: 'Veritas University delegation, Ship House — 5 May 2026', event_date: '5 May 2026', category: 'Engagements' },
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/b64dada37ea1a198b4a6e0382f45f0c0/WhatsApp-Image-2026-05-05-at-04.41.488-1.jpg', alt_text: 'Engagement on national security', caption: 'Engagement on national security — 5 May 2026', event_date: '5 May 2026', category: 'Security' },
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/7d5dab6eb3370ef45d22dfbeceb170b0/WhatsApp-Image-2026-05-05-at-04.41.4644.jpg', alt_text: 'Address to students', caption: 'Address to Nigerian students — 5 May 2026', event_date: '5 May 2026', category: 'Engagements' },
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/de24e192a317d951778e07962e82686d/WhatsApp-Image-2026-04-29-at-21.34.414.jpg', alt_text: 'Strategic committees inauguration', caption: 'Inauguration of strategic committees — 29 April 2026', event_date: '29 April 2026', category: 'Ceremonies' },
        { image_url: 'https://defence.gov.ng/wp-content/uploads/slider/cache/39e7bd9f42f86e2e15e02a7a8e72b6bb/WhatsApp-Image-2026-04-29-at-21.34.426.jpg', alt_text: 'Ship House conference room', caption: 'Strategic committee session, Ship House', event_date: '', category: 'Ceremonies' },
      ];
    }

    /* ── Render filter buttons ── */
    function renderFilters() {
      var cats = ['All'];
      allImages.forEach(function (img) {
        if (img.category && cats.indexOf(img.category) === -1) {
          cats.push(img.category);
        }
      });
      filters.innerHTML = '';
      cats.forEach(function (cat) {
        var btn = document.createElement('button');
        btn.className = 'gallery-filter-btn' + (cat === activeCategory ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', function () {
          activeCategory = cat;
          renderFilters();
          renderGrid();
        });
        filters.appendChild(btn);
      });
    }

    /* ── Render grid ── */
    function renderGrid() {
      var filtered = activeCategory === 'All'
        ? allImages
        : allImages.filter(function (img) { return img.category === activeCategory; });

      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      grid.style.display = '';
      grid.innerHTML = '';

      filtered.forEach(function (img) {
        var fig = document.createElement('figure');

        if (img.category) {
          var badge = document.createElement('span');
          badge.className = 'gallery-cat-badge';
          badge.textContent = img.category;
          fig.appendChild(badge);
        }

        var image = document.createElement('img');
        image.src = img.image_url;
        image.alt = img.alt_text || '';
        image.loading = 'lazy';
        fig.appendChild(image);

        var caption = img.caption || '';
        if (img.event_date) caption = caption || img.event_date;
        if (caption) {
          var fc = document.createElement('figcaption');
          fc.textContent = caption;
          fig.appendChild(fc);
        }

        (function (captured) {
          fig.addEventListener('click', function () { openLightbox(captured, lbImages); });
        }(img));
        grid.appendChild(fig);
      });

      // keep a reference to the current filtered set for lightbox navigation
      lbImages = filtered;
    }

    function render() {
      loading.style.display = 'none';
      renderFilters();
      renderGrid();
    }

    /* ── Lightbox ── */
    function showLbImage(index) {
      var img = lbImages[index];
      if (!img) return;
      lbIndex = index;

      lbImg.classList.add('fading');
      setTimeout(function () {
        lbImg.src = img.image_url;
        lbImg.alt = img.alt_text || '';
        lbImg.classList.remove('fading');
      }, 180);

      var cap = img.caption || '';
      if (img.event_date && cap.indexOf(img.event_date) === -1) {
        cap = cap ? cap + ' — ' + img.event_date : img.event_date;
      }
      lbCap.textContent = cap;
      lbCounter.textContent = (index + 1) + ' / ' + lbImages.length;

      lbPrev.style.visibility = lbImages.length > 1 ? '' : 'hidden';
      lbNext.style.visibility = lbImages.length > 1 ? '' : 'hidden';
    }

    function openLightbox(img, images) {
      lbImages = images || lbImages;
      var idx = lbImages.indexOf(img);
      lbIndex = idx >= 0 ? idx : 0;
      lbImg.src = '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      showLbImage(lbIndex);
      lbClose.focus();
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    lbPrev.addEventListener('click', function (e) {
      e.stopPropagation();
      showLbImage((lbIndex - 1 + lbImages.length) % lbImages.length);
    });
    lbNext.addEventListener('click', function (e) {
      e.stopPropagation();
      showLbImage((lbIndex + 1) % lbImages.length);
    });
    lbClose.addEventListener('click', closeLightbox);
    lb.addEventListener('click', function (e) { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', function (e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   showLbImage((lbIndex - 1 + lbImages.length) % lbImages.length);
      if (e.key === 'ArrowRight')  showLbImage((lbIndex + 1) % lbImages.length);
    });

    /* ── Boot ── */
    loadGallery();
  }());
  </script>
</body>
</html>
